<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galerie | Alte Kameraden</title>
  <meta name="description" content="Galerie des Jägerzugs Alte Kameraden." />
  <link rel="stylesheet" href="style.css">
</head>

<body class="galerie">
  <header class="subpage-header">
    
    <nav>
  <div class="nav-inner">

    <!-- LOGO / optional -->
    <div class="nav-title"></div>

    <!-- BURGER BUTTON -->
    <div class="burger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- NAV LINKS -->
    <div class="nav-links" id="navLinks">
     <!-- <a href="koenige.html">Könige</a> -->
      <a href="index.html">Startseite</a>
      <a href="index.html#termine">Termine</a>
      <a href="index.html#kontakt">Kontakt</a>
    </div>

  </div>
</nav>


    <div class="subpage-hero">
      <h1 class="section-title">Galerie</h1>
      <p>Fotos und Erinnerungen unseres Jägerzugs.</p>
    </div>
  </header>

  <main>
    <section>
      <div class="container" id="gallery-container">
        <!-- Galerie wird automatisch eingefügt -->
      </div>
    </section>
  </main>

  <div id="lightbox" class="lightbox">
    <span class="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="Großansicht">
  </div>

  <footer>
    <div class="footer-inner">
      <div>© 2026 Jägerzug Alte Kameraden AK92</div>
      <div class="footer-links">
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
      </div>
    </div>
  </footer>

  <script>
    const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxClose = document.querySelector(".lightbox-close");

function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}
    
function openLightbox(src, alt) {
  lightboxImg.src = src;
  lightboxImg.alt = alt || "Großansicht";
  lightbox.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  lightbox.classList.remove("active");
  lightboxImg.src = "";
  document.body.style.overflow = "";
}

lightboxClose.addEventListener("click", closeLightbox);
lightboxClose.addEventListener("touchend", closeLightbox);

lightbox.addEventListener("click", function(e) {
  if (e.target === lightbox) closeLightbox();
});
  function formatMonth(folderName) {
    const [year, month] = folderName.split("-");
    const date = new Date(year, month - 1);

    return date.toLocaleString("de-DE", {
      month: "long",
      year: "numeric"
    });
  }

  fetch("bilder/galerie/gallery.json")
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById("gallery-container");

      // 🔥 Daten nach Jahr gruppieren
      const years = {};

      Object.keys(data).forEach(folder => {
        const year = folder.split("-")[0];
        if (!years[year]) years[year] = [];
        years[year].push(folder);
      });

      // 🔥 Jahre sortieren (neueste zuerst)
      Object.keys(years)
        .sort((a, b) => b - a)
        .forEach(year => {

          const details = document.createElement("details");
          details.className = "gallery-year";
          details.open = true; // standardmäßig geöffnet

          const summary = document.createElement("summary");
          summary.textContent = year;
          details.appendChild(summary);

          // Monate im Jahr sortieren
          years[year]
            .sort((a, b) => new Date(b) - new Date(a))
            .forEach(folder => {

              const monthDiv = document.createElement("div");
              monthDiv.className = "gallery-month";

              const title = document.createElement("h2");
              title.textContent = formatMonth(folder);
              monthDiv.appendChild(title);

              const grid = document.createElement("div");
              grid.className = "photo-grid";

              data[folder]
                .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }))
                .reverse()
                .forEach(file => {
                  const img = document.createElement("img");
                  img.src = `bilder/galerie/${folder}/${file}`;
                  img.alt = `Galerie Foto ${title.textContent}`;
                  img.loading = "lazy";

                  img.addEventListener("click", function(e) {
  e.preventDefault();
  e.stopPropagation();
  openLightbox(this.currentSrc || this.src, this.alt);
});

img.addEventListener("touchend", function(e) {
  e.preventDefault();
  openLightbox(this.currentSrc || this.src, this.alt);
});

                  grid.appendChild(img);
                });

              monthDiv.appendChild(grid);
              details.appendChild(monthDiv);
            });

          container.appendChild(details);
        });
    })
    .catch(error => {
      console.error("Fehler beim Laden der Galerie:", error);
    });
</script>
</body>
</html>
